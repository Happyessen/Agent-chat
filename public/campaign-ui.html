<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Campaign Assistant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a1a;
  --surface: #242424;
  --surface-2: #2e2e2e;
  --border: rgba(255,255,255,0.08);
  --accent: #6366f1;
  --accent-light: rgba(99,102,241,0.15);
  --text: #f0f0f0;
  --text-muted: #888;
  --green: #10b981;
  --green-light: rgba(16,185,129,0.12);
}

html, body {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.6;
}

body { padding: 16px; }

main { max-width: 560px; margin: 0 auto; }

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.header-icon {
  width: 32px; height: 32px;
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.header h1 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.header p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
}

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 12px;
  color: var(--text-muted);
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

.status-dot.loading {
  background: var(--accent);
  animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}

.empty-state .icon { font-size: 32px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; line-height: 1.7; }

/* Result card */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
}

.result-card-header {
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.result-card-body {
  padding: 14px;
}

/* Markdown rendering */
.md-content h1, .md-content h2 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin: 16px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.md-content h1:first-child,
.md-content h2:first-child { margin-top: 0; }

.md-content h3 {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 14px 0 6px;
}

.md-content h3:first-child { margin-top: 0; }

.md-content p {
  font-size: 13px;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.65;
}

.md-content ul, .md-content ol {
  padding-left: 0;
  margin: 6px 0 10px;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.md-content li {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  font-size: 13px;
  color: var(--text);
  line-height: 1.55;
}

.md-content li::before {
  content: "›";
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 1px;
}

.md-content strong { color: var(--text); font-weight: 600; }

.md-content a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(99,102,241,0.3);
}

.md-content a:hover { border-bottom-color: var(--accent); }

.md-content code {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", monospace;
}

.md-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}

/* Post cards */
.post-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.post-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}

.post-card-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}

.post-card-caption {
  font-size: 13px;
  color: var(--text);
  line-height: 1.55;
  margin-bottom: 6px;
}

.post-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.post-meta-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-muted);
}

.post-meta-tag.likes { color: var(--green); }

.post-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(99,102,241,0.3);
}

/* Stat chips */
.stat-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 8px 0;
}

.stat-chip {
  background: var(--accent-light);
  border: 1px solid rgba(99,102,241,0.2);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
}

.stat-chip.green {
  background: var(--green-light);
  border-color: rgba(16,185,129,0.2);
  color: var(--green);
}

/* Action buttons */
.actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

button {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  flex: 1;
}

.btn-primary:hover:not(:disabled) {
  background: #4f52d9;
  box-shadow: 0 4px 12px rgba(99,102,241,0.35);
}

.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover { background: var(--surface); color: var(--text); }

/* Error */
/* Input area */
.input-wrap {
  position: sticky;
  bottom: 0;
  background: var(--bg);
  padding: 12px 0 4px;
  margin-top: 12px;
}
.input-box {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 10px;
  transition: border-color 0.15s;
}
.input-box:focus-within { border-color: rgba(99,102,241,0.5); }
#user-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  max-height: 120px;
  min-height: 22px;
}
#user-input::placeholder { color: var(--text-muted); }
#send-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
  transition: background 0.15s, opacity 0.15s;
  padding: 0;
}
#send-btn:hover:not(:disabled) { background: #4f52d9; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.input-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 6px; }
.error-box {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
  color: #f87171;
}
</style>
</head>
<body>
<main>

  <div class="header">
    <div class="header-icon">📊</div>
    <div>
      <h1>Campaign Assistant</h1>
      <p>Powered by your n8n agent</p>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready — send a message to begin</span>
  </div>

  <div id="content-area">
    <div class="empty-state" id="empty-state">
      <div class="icon">💡</div>
      <p>Ask about a campaign, send a topic like<br><strong>"travelling campaign"</strong> or <strong>"postpaid offer"</strong></p>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-box">
      <textarea id="user-input" rows="1" placeholder="Ask about a campaign..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send"></main>#10148;</button>
    </div>
    <p class="input-hint">Enter to send &middot; Shift+Enter for new line</p>
  </div>

</main>

<script type="module">
let rpcId = 0;
const pendingRequests = new Map();

const rpcNotify = (method, params) =>
  window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");

const rpcRequest = (method, params) =>
  new Promise((resolve, reject) => {
    const id = ++rpcId;
    pendingRequests.set(id, { resolve, reject });
    window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
  });

window.addEventListener("message", (event) => {
  if (event.source !== window.parent) return;
  const msg = event.data;
  if (!msg || msg.jsonrpc !== "2.0") return;

  if (typeof msg.id === "number") {
    const p = pendingRequests.get(msg.id);
    if (!p) return;
    pendingRequests.delete(msg.id);
    msg.error ? p.reject(msg.error) : p.resolve(msg.result);
    return;
  }

  if (msg.method === "ui/notifications/tool-result") {
    handleToolResult(msg.params);
  }
}, { passive: true });

// Init bridge
(async () => {
  try {
    await rpcRequest("ui/initialize", {
      appInfo: { name: "campaign-assistant", version: "1.0.0" },
      appCapabilities: {},
      protocolVersion: "2026-01-26",
    });
    rpcNotify("ui/notifications/initialized", {});
  } catch (e) {
    console.error("Bridge init failed", e);
  }
})();

// ── Handle tool result ────────────────────────────────────────────────────────
function handleToolResult(params) {
  setStatus("ready", "Response received");

  const area = document.getElementById("content-area");
  area.innerHTML = "";

  // Get the raw text response
  const raw =
    params?.content?.[0]?.text ??
    params?.result ??
    params?.message ??
    (typeof params === "string" ? params : null);

  if (raw) {
    renderMarkdown(raw, area);
  } else {
    area.innerHTML = `<div class="error-box">No response content received from agent.</div>`;
  }
}

// ── Render structured JSON ────────────────────────────────────────────────────
function renderStructured(data, area) {
  // This function is no longer used - we display raw markdown instead
  renderMarkdown(data.message || JSON.stringify(data), area);
}

// ── Render raw markdown ───────────────────────────────────────────────────────
function renderMarkdown(text, area) {
  // Simple card with the raw response
  const card = makeCard("📋 Campaign Results");
  const body = card.querySelector(".result-card-body");
  
  // Basic markdown rendering
  const html = renderMdToHtml(text);
  body.innerHTML = html;
  
  area.appendChild(card);
  addActions(area);
}

function renderMdToHtml(text) {
  // Protect code blocks
  const blocks = [];
  text = text.replace(/```[\s\S]*?```/g, m => { blocks.push(m); return `\x00CODE${blocks.length-1}\x00`; });

  let h = esc(text);

  // Restore code blocks
  h = h.replace(/\x00CODE(\d+)\x00/g, (_, i) =>
    `<pre style="background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px;overflow-x:auto;font-size:12px;font-family:monospace">${esc(blocks[+i].replace(/```\w*\n?|```/g,"").trim())}</pre>`
  );

  // Inline code
  h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Bold
  h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Italic
  h = h.replace(/\*(.+?)\*/g, "<em>$1</em>");
  // Links
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1 ↗</a>');

  // Process lines
  const lines = h.split("\n");
  const out = [];
  let inUl = false, inOl = false;

  const closeList = () => {
    if (inUl) { out.push("</ul>"); inUl = false; }
    if (inOl) { out.push("</ol>"); inOl = false; }
  };

  for (const line of lines) {
    if (/^### /.test(line)) { closeList(); out.push(`<h3>${line.slice(4)}</h3>`); continue; }
    if (/^## /.test(line))  { closeList(); out.push(`<h2>${line.slice(3)}</h2>`); continue; }
    if (/^# /.test(line))   { closeList(); out.push(`<h2>${line.slice(2)}</h2>`); continue; }
    if (/^---+$/.test(line.trim())) { closeList(); out.push("<hr>"); continue; }

    const ul = line.match(/^[\-\*] (.+)/);
    if (ul) {
      if (!inUl) { if (inOl) { out.push("</ol>"); inOl = false; } out.push('<ul class="md-content">'); inUl = true; }
      out.push(`<li>${ul[1]}</li>`); continue;
    }

    const ol = line.match(/^\d+\. (.+)/);
    if (ol) {
      if (!inOl) { if (inUl) { out.push("</ul>"); inUl = false; } out.push('<ol class="md-content">'); inOl = true; }
      out.push(`<li>${ol[1]}</li>`); continue;
    }

    if (line.trim() === "") { closeList(); out.push("<br>"); continue; }
    if (!inUl && !inOl) out.push(`<p>${line}</p>`);
    else out.push(`<li>${line}</li>`);
  }
  closeList();
  return `<div class="md-content">${out.join("")}</div>`;
}
  // Protect code blocks
  const blocks = [];
  text = text.replace(/```[\s\S]*?```/g, m => { blocks.push(m); return `\x00CODE${blocks.length-1}\x00`; });

  let h = esc(text);

  // Restore code blocks
  h = h.replace(/\x00CODE(\d+)\x00/g, (_, i) =>
    `<pre style="background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:10px;overflow-x:auto;font-size:12px;font-family:monospace">${esc(blocks[+i].replace(/```\w*\n?|```/g,"").trim())}</pre>`
  );

  // Inline code
  h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Bold
  h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Italic
  h = h.replace(/\*(.+?)\*/g, "<em>$1</em>");
  // Links
  h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1 ↗</a>');

  // Process lines
  const lines = h.split("\n");
  const out = [];
  let inUl = false, inOl = false;

  const closeList = () => {
    if (inUl) { out.push("</ul>"); inUl = false; }
    if (inOl) { out.push("</ol>"); inOl = false; }
  };

  for (const line of lines) {
    if (/^### /.test(line)) { closeList(); out.push(`<h3>${line.slice(4)}</h3>`); continue; }
    if (/^## /.test(line))  { closeList(); out.push(`<h2>${line.slice(3)}</h2>`); continue; }
    if (/^# /.test(line))   { closeList(); out.push(`<h2>${line.slice(2)}</h2>`); continue; }
    if (/^---+$/.test(line.trim())) { closeList(); out.push("<hr>"); continue; }

    const ul = line.match(/^[\-\*] (.+)/);
    if (ul) {
      if (!inUl) { if (inOl) { out.push("</ol>"); inOl = false; } out.push('<ul class="md-content">'); inUl = true; }
      out.push(`<li>${ul[1]}</li>`); continue;
    }

    const ol = line.match(/^\d+\. (.+)/);
    if (ol) {
      if (!inOl) { if (inUl) { out.push("</ul>"); inUl = false; } out.push('<ol class="md-content">'); inOl = true; }
      out.push(`<li>${ol[1]}</li>`); continue;
    }

    if (line.trim() === "") { closeList(); out.push("<br>"); continue; }
    if (!inUl && !inOl) out.push(`<p>${line}</p>`);
    else out.push(`<li>${line}</li>`);
  }
  closeList();
  return `<div class="md-content">${out.join("")}</div>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function makeCard(title) {
  const card = document.createElement("div");
  card.className = "result-card";
  card.innerHTML = `
    <div class="result-card-header">${title}</div>
    <div class="result-card-body"></div>`;
  return card;
}

function addActions(area) {
  const div = document.createElement("div");
  div.className = "actions";
  div.innerHTML = `
    <button class="btn-ghost" id="clear-btn">Clear</button>`;
  div.querySelector("#clear-btn").onclick = () => {
    area.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="icon">💡</div>
        <p>Ask about a campaign, send a topic like<br><strong>"travelling campaign"</strong> or <strong>"postpaid offer"</strong></p>
      </div>`;
    setStatus("ready", "Ready — send a message to begin");
  };
  area.appendChild(div);
}

function setStatus(type, text) {
  const dot = document.getElementById("status-dot");
  document.getElementById("status-text").textContent = text;
  dot.className = "status-dot" + (type === "loading" ? " loading" : "");
}

function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
// ── Send message to agent ───────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.getElementById("send-btn");
  sendBtn.disabled = true;
  input.value = "";
  input.style.height = "auto";

  setStatus("loading", "Sending to agent...");

  // Show user bubble
  const area = document.getElementById("content-area");
  const emptyState = document.getElementById("empty-state");
  if (emptyState) emptyState.remove();

  const bubble = document.createElement("div");
  bubble.style.cssText = "background:var(--accent-light);border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--text)";
  bubble.textContent = text;
  area.insertBefore(bubble, area.firstChild);

  try {
    await rpcRequest("tools/call", {
      name: "send_message",
      arguments: {
        message: text,
        session_id: "session_" + Date.now(),
      },
    });
  } catch (err) {
    setStatus("ready", "Error — try again");
    area.innerHTML = `<div class="error-box">Failed to send: ${err?.message ?? err}</div>`;
  } finally {
    sendBtn.disabled = false;
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}
</script>
</body>
</html>
