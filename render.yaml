services:
  - type: web
    name: agent-chat-rest-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: PORT
        value: 3001

  - type: web
    name: agent-chat-mcp
    runtime: node
    buildCommand: npm install
    startCommand: node app-mcp-server.js
    envVars:
      - key: AGENT_API_URL
        value: http://agent-chat-rest-api:3001
      - key: MCP_PORT
        value: 8787
